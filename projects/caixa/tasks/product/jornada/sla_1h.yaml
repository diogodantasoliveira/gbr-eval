task_id: caixa.jornada.sla_1h
project: caixa
category: latency
component: jornadas
layer: product
tier: gate
tenant_profile: global
description: "Verifica que jornadas simples completam dentro do SLA de 1 hora"

input:
  endpoint: /api/v1/jornada/metrics
  payload:
    sla_target: 1h

expected:
  tempo_processamento_s: 1800

graders:
  - type: numeric_range
    field: tempo_processamento_s
    weight: 1.0
    required: true
    config:
      min: 0
      max: 3600
      severity: critical

scoring_mode: binary
pass_threshold: 1.0
golden_set_tags: ["seed"]
