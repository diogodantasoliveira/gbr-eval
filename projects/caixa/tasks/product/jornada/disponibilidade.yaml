task_id: caixa.jornada.disponibilidade
project: caixa
category: latency
component: jornadas
layer: product
tier: gate
tenant_profile: global
description: "Verifica que a disponibilidade do serviço de jornadas atinge o SLA de 99.5%"

input:
  endpoint: /api/v1/jornada/metrics
  payload:
    metric: disponibilidade

expected:
  disponibilidade: 0.999

graders:
  - type: numeric_range
    field: disponibilidade
    weight: 1.0
    required: true
    config:
      min: 0.995
      max: 1.0
      severity: critical

scoring_mode: binary
pass_threshold: 1.0
golden_set_tags: ["seed"]
