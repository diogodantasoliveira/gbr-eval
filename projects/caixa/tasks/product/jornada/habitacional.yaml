task_id: caixa.jornada.habitacional
project: caixa
category: decision
component: jornadas
layer: product
tier: gate
tenant_profile: global
description: "Verifica execução completa da jornada de crédito habitacional"

input:
  endpoint: /api/v1/jornada/executar
  payload:
    jornada: habitacional

expected:
  resultado_final: "APROVADO_COM_RESSALVAS"
  checklist_resultado: "PLACEHOLDER — substituir por golden set real"
  cruzamento_ok: true

graders:
  - type: exact_match
    field: resultado_final
    weight: 3
    required: true
    config:
      severity: critical
  - type: field_not_empty
    field: checklist_resultado
    weight: 1.0
    required: true
    config:
      severity: high
  - type: exact_match
    field: cruzamento_ok
    weight: 1.0
    required: true
    config:
      severity: high

scoring_mode: weighted
pass_threshold: 0.95
golden_set_tags: ["seed"]
