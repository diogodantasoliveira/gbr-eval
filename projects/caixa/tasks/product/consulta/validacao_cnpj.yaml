task_id: caixa.consulta.validacao_cnpj
project: caixa
category: extraction
component: consulta-bases
layer: product
tier: gate
tenant_profile: global
description: "Verifica consulta à Receita Federal para validação de situação cadastral de CNPJ e sócios"

input:
  endpoint: /api/v1/consulta/cnpj
  payload:
    document_type: cnpj

expected:
  situacao_cadastral: "ATIVA"
  socios: "PLACEHOLDER — substituir por golden set real"

graders:
  - type: exact_match
    field: situacao_cadastral
    weight: 1.0
    required: true
    config:
      severity: critical
  - type: field_f1
    field: socios
    weight: 2
    required: true
    config:
      severity: high

scoring_mode: weighted
pass_threshold: 0.95
golden_set_tags: ["seed"]
