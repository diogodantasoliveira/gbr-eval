task_id: caixa.classificacao.confuser.contrato_registrado_not_comercial
project: caixa
category: classification
component: classificacao-documental
layer: product
tier: gate
tenant_profile: global
description: "Contrato comercial registrado nao deve ser classificado como contrato comercial simples (confuser negativo)"

input:
