task_id: caixa.regra_simples.nome_confere
project: caixa
category: decision
component: regras-negociais
layer: product
tier: gate
tenant_profile: global
description: "Verifica que o nome no documento confere com o nome cadastrado"

input:
  endpoint: /api/v1/regras/avaliar
  payload:
    regra: nome_confere

expected:
  nome_match: true

graders:
  - type: exact_match
    field: nome_match
    weight: 1.0
    required: true
    config:
      severity: high

scoring_mode: weighted
pass_threshold: 0.95
golden_set_tags: ["seed"]
