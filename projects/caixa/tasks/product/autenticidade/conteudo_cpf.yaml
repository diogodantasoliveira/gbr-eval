task_id: caixa.autenticidade.conteudo_cpf
project: caixa
category: decision
component: validacao-autenticidade
layer: product
tier: gate
tenant_profile: global
description: "Verifica que o CPF extraído do documento passa na validação de dígito verificador"

input:
  endpoint: /api/v1/autenticidade/conteudo
  payload:
    document_type: generic

expected:
  cpf_valido: true

graders:
  - type: exact_match
    field: cpf_valido
    weight: 1.0
    required: true
    config:
      severity: high

scoring_mode: weighted
pass_threshold: 0.95
golden_set_tags: ["seed"]
