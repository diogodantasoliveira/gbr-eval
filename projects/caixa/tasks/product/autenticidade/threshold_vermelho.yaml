task_id: caixa.autenticidade.threshold_vermelho
project: caixa
category: decision
component: validacao-autenticidade
layer: product
tier: gate
tenant_profile: global
description: "Verifica que documento suspeito é classificado como vermelho"

input:
  endpoint: /api/v1/autenticidade/classificar
  payload:
    document_type: generic

expected:
  classificacao: vermelho

graders:
  - type: exact_match
    field: classificacao
    weight: 1.0
    required: true
    config:
      severity: high

scoring_mode: weighted
pass_threshold: 0.95
golden_set_tags: ["seed"]
