task_id: eng.billing.idempotency_key
category: classification
component: engine-billing
layer: engineering
tier: gate
description: "Every financial mutation endpoint must have an idempotency key"
input:
  payload:
    repo: atom-back-end
    scan_target: "src/infrastructure/adapters/inbound/*_router.py"
expected:
  convention: idempotency_required
graders:
  - type: scope_check
    field: idempotency_key
    weight: 1.0
    required: true
    config:
      decorator_pattern: "@router\\.(post|put|delete|patch)"
      required_param: "idempotency_key|idempotent_key|dedup_key"
      skip_if_no_matches: true
      file_key: content
scoring_mode: binary
pass_threshold: 1.0
eval_owner: diogo.dantas
eval_cadence: per-pr
