task_id: eng.billing.audit_trail
category: classification
component: engine-billing
layer: engineering
tier: gate
description: "Every financial mutation endpoint must have audit trail logging"
input:
  payload:
    repo: atom-back-end
    scan_target: "src/infrastructure/adapters/inbound/*_router.py"
expected:
  convention: audit_trail_required
graders:
  - type: scope_check
    field: audit_coverage
    weight: 1.0
    required: true
    config:
      decorator_pattern: "@router\\.(post|put|delete|patch)"
      required_call: "audit\\.append|audit_log|create_audit|log_action|log_financial_action"
      skip_if_no_matches: true
      file_key: content
scoring_mode: binary
pass_threshold: 0.8
eval_owner: diogo.dantas
eval_cadence: per-pr
