task_id: eng.frontend.typescript_quality
category: classification
component: gbr-eval-frontend
layer: engineering
tier: gate
description: "Verifica qualidade TypeScript — sem any explícito, sem ts-ignore, sem non-null assertions excessivos"

input:
  payload:
    repo: gbr-eval-frontend
    scan_target: "src/**/*.ts"

expected:
  convention: strict_typescript

graders:
  - type: pattern_forbidden
    field: no_explicit_any
    weight: 1.0
    required: false
    config:
      pattern: ':\s*any\b'
      file_key: content
      severity: high

  - type: pattern_forbidden
    field: no_ts_ignore
    weight: 1.0
    required: true
    config:
      pattern: '@ts-ignore|@ts-nocheck'
      file_key: content
      severity: critical

  - type: pattern_forbidden
    field: no_type_assertion_abuse
    weight: 0.5
    required: false
    config:
      pattern: '\bas\s+any\b'
      file_key: content
      severity: high

scoring_mode: weighted
pass_threshold: 0.7
eval_owner: diogo.dantas
eval_cadence: per-pr
