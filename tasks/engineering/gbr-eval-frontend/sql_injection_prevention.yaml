task_id: eng.frontend.sql_injection_prevention
category: classification
component: gbr-eval-frontend
layer: engineering
tier: gate
description: "Verifica que queries SQL usam Drizzle ORM parametrizado, sem string interpolation em SQL"

input:
  payload:
    repo: gbr-eval-frontend
    scan_target: "src/app/api/**/route.ts"

expected:
  convention: parameterized_queries

graders:
  - type: pattern_forbidden
    field: no_raw_sql_interpolation
    weight: 1.0
    required: true
    config:
      pattern: '(?<!sql)`SELECT[^`]*\$\{|"SELECT.*"\s*\+|''SELECT.*''\s*\+'
      file_key: content
      severity: critical

  - type: pattern_forbidden
    field: no_exec_raw
    weight: 1.0
    required: true
    config:
      pattern: '\.exec\s*\(\s*[`"''].*\$\{'
      file_key: content
      severity: critical

  - type: engineering_judge
    field: data_access_review
    weight: 1.0
    required: false
    config:
      rubric: |
        Review this TypeScript file for data access security in a Next.js application using Drizzle ORM with SQLite.
        Evaluate:
        1. SQL INJECTION: Are all database queries using Drizzle's query builder or parameterized sql`` tagged templates? Any string concatenation in queries?
        2. INPUT VALIDATION: Are user inputs from URL params, search params, or request bodies validated (e.g., with Zod) before being used in queries?
        3. DATA EXPOSURE: Do API responses leak internal database IDs, schemas, or sensitive fields that shouldn't be exposed?
        4. AUTHORIZATION: Are there any query paths that bypass access checks or return unscoped data?
        Score 5 only if all checks pass with zero findings.
      min_score: 3.0
      file_key: content
      language: typescript

scoring_mode: hybrid
pass_threshold: 0.8
eval_owner: diogo.dantas
eval_cadence: per-pr
