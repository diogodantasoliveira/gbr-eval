task_id: eng.atom.tenant_id_filter
category: classification
component: atom-back-end
layer: engineering
tier: gate
description: "Every database query/repository must filter by tenant_id or use RLS context"
input:
  payload:
    repo: atom-back-end
    scan_target: "src/infrastructure/adapters/outbound/postgres/**/*.py"
expected:
  convention: tenant_id_required
graders:
  - type: pattern_required
    field: tenant_id_usage
    weight: 1.0
    required: true
    config:
      pattern: 'tenant_id|current_tenant_id|set_tenant_context|RLS|row.level.security|has_tenant_access'
      file_key: content
  - type: pattern_forbidden
    field: no_unfiltered_queries
    weight: 1.0
    required: true
    config:
      pattern: '\.query\([A-Za-z_]\w*\)\s*\.all\(\)|\.query\([A-Za-z_]\w*\)\s*\.first\(\)|select\([^)]+\)(?!.*(?:where|filter|tenant))'
      file_key: content
scoring_mode: weighted
pass_threshold: 0.90
eval_owner: diogo.dantas
eval_cadence: per-pr
