task_id: eng.atom_back_end.bff_atom_headers
category: classification
component: atom-back-end
layer: engineering
tier: gate
description: "BFF routes must use atomHeaders(), never serviceAuthKey()"
input:
  payload:
    repo: atom-back-end
    scan_target: "src/infrastructure/adapters/inbound/**/*.py"
expected:
  convention: bff_atom_headers
graders:
  - type: pattern_forbidden
    field: no_service_auth_key
    weight: 1.0
    required: true
    config:
      pattern: "serviceAuthKey\\("
      file_key: content
  - type: pattern_required
    field: atom_headers_used
    weight: 1.0
    required: false
    config:
      pattern: "atomHeaders\\(|atom_headers\\("
      file_key: content
scoring_mode: binary
pass_threshold: 1.0
eval_owner: diogo.dantas
eval_cadence: per-pr
