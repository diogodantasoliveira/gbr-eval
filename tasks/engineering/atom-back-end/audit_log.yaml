task_id: eng.atom.audit_log
category: classification
component: atom-back-end
layer: engineering
tier: gate
description: "Every administrative mutation endpoint must have audit logging"
input:
  payload:
    repo: atom-back-end
    scan_target: "src/infrastructure/adapters/inbound/*_router.py"
expected:
  convention: audit_log_required
graders:
  - type: scope_check
    field: audit_coverage
    weight: 1.0
    required: true
    config:
      decorator_pattern: "@router\\.(post|put|delete|patch)"
      required_call: "audit\\.append|audit_log|create_audit|log_action"
      skip_if_no_matches: true
      file_key: content
  - type: pattern_forbidden
    field: no_sensitive_in_print
    weight: 0.5
    required: true
    config:
      pattern: "print\\(.*password|print\\(.*secret|print\\(.*token"
      file_key: content
scoring_mode: weighted
pass_threshold: 0.8
eval_owner: diogo.dantas
eval_cadence: per-pr
