task_id: eng.atom_fe.no_secrets_in_code
category: classification
component: atom-front-end
layer: engineering
tier: gate
description: "Nenhum secret, API key ou token hardcoded no código fonte"
input:
  payload:
    repo: atom-front-end
    scan_target: "**/*.ts"
expected:
  convention: no_hardcoded_secrets
graders:
  - type: pattern_forbidden
    field: no_api_keys
    weight: 1.0
    required: true
    config:
      pattern: '(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token)\s*[:=]\s*["\x27][A-Za-z0-9_\-]{16,}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_bearer_tokens
    weight: 1.0
    required: true
    config:
      pattern: '(?i)bearer\s+[A-Za-z0-9_\-\.]{20,}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_aws_keys
    weight: 1.0
    required: true
    config:
      pattern: '(?i)(AKIA|ASIA)[A-Z0-9]{16}'
      file_key: content
      severity: critical
scoring_mode: binary
pass_threshold: 1.0
eval_owner: diogo.dantas
eval_cadence: per-pr
