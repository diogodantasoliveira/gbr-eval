task_id: eng.atom_fe.credentials_include
category: convention
component: atom-front-end
layer: engineering
tier: gate
description: "O wrapper central de fetch (apiFetchJson) deve usar credentials: 'include' para enviar cookies ao BFF"
input:
  payload:
    repo: atom-front-end
    scan_target: "lib/orchestrator/api-client.ts"
expected:
  convention: credentials_include
graders:
  - type: pattern_required
    field: credentials_present
    weight: 1.0
    required: true
    config:
      pattern: 'credentials\s*:\s*["\x27]include["\x27]'
      file_key: content
  - type: pattern_forbidden
    field: no_credentials_omit
    weight: 1.0
    required: true
    config:
      pattern: 'credentials\s*:\s*["\x27]omit["\x27]'
      file_key: content
      severity: high
scoring_mode: weighted
pass_threshold: 0.90
eval_owner: diogo.dantas
eval_cadence: per-pr
