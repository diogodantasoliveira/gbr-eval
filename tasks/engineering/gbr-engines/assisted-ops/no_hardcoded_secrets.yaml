task_id: eng.gbr_assisted_ops.no_hardcoded_secrets
category: classification
component: gbr-assisted-ops
layer: engineering
tier: gate
description: "Assisted Ops não deve conter API keys ou secrets hardcoded"
input:
  payload:
    repo: services/assisted-ops
    scan_target: "app/**/*.py"
expected:
  convention: no_hardcoded_secrets
graders:
  - type: pattern_forbidden
    field: no_anthropic_key
    weight: 1.0
    required: false
    config:
      pattern: 'sk-ant-[a-zA-Z0-9]{20,}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_aws_keys
    weight: 1.0
    required: false
    config:
      pattern: 'AKIA[0-9A-Z]{16}'
      file_key: content
      severity: critical
scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
