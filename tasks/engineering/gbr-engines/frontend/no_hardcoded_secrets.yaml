task_id: eng.gbr_frontend.no_hardcoded_secrets
category: classification
component: gbr-frontend
layer: engineering
tier: gate
description: "Frontend não deve conter segredos hardcoded"
input:
  payload:
    repo: services/frontend
    scan_target: "apps/web/src/**/*.ts"
expected:
  convention: no_secrets
graders:
  - type: pattern_forbidden
    field: no_api_key_hardcoded
    weight: 1.0
    required: false
    config:
      pattern: '(?:api[_-]?key|secret[_-]?key|password)\s*[:=]\s*["\x27][A-Za-z0-9+/=]{20,}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_jwt_hardcoded
    weight: 1.0
    required: false
    config:
      pattern: 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.'
      file_key: content
      severity: critical
scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
