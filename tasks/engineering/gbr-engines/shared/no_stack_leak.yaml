task_id: eng.gbr_shared.no_stack_leak
category: classification
component: gbr-shared
layer: engineering
tier: gate
description: "Shared library não deve expor stack traces"
input:
  payload:
    repo: shared
    scan_target: "**/*.py"
expected:
  convention: no_stack_leak
graders:
