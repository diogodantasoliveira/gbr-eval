task_id: eng.gbr_document_vault.no_hardcoded_secrets
category: classification
component: gbr-document-vault
layer: engineering
tier: gate
description: "Document Vault não deve conter API keys ou secrets hardcoded"
input:
  payload:
    repo: services/document-vault
    scan_target: "app/**/*.py"
expected:
  convention: no_hardcoded_secrets
graders:
  - type: pattern_forbidden
    field: no_aws_keys
    weight: 1.0
    required: false
    config:
      pattern: 'AKIA[0-9A-Z]{16}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_s3_hardcoded
    weight: 1.0
    required: false
    config:
      pattern: 'sk-[a-zA-Z0-9]{20,}'
      file_key: content
      severity: critical
scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
