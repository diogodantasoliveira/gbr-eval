task_id: eng.gbr_ai_engine.no_credit_leak
category: classification
component: gbr-ai-engine
layer: engineering
tier: gate
description: "AI Engine não deve expor saldo de créditos ou tenant_id em respostas de erro"
input:
  payload:
    repo: services/ai-engine
    scan_target: "app/api/*.py"
expected:
  convention: no_credit_leak
graders:
  - type: pattern_forbidden
    field: no_saldo_in_detail
    weight: 1.0
    required: false
    config:
      pattern: 'detail\s*=\s*f["\x27][^"'']*saldo'
      file_key: content
      severity: warning
  - type: pattern_forbidden
    field: no_tenant_in_detail
    weight: 1.0
    required: false
    config:
      pattern: 'detail\s*=\s*f["\x27][^"'']*tenant_id'
      file_key: content
      severity: warning
scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
