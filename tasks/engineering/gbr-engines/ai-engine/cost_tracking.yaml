task_id: eng.gbr_ai_engine.cost_tracking
category: convention
component: gbr-ai-engine
layer: engineering
tier: gate
description: "LLM client deve reportar uso de tokens ao billing service"
input:
  payload:
    repo: services/ai-engine
    scan_target: "app/services/llm_client.py"
expected:
  convention: token_usage_tracked
graders:
  - type: pattern_required
    field: reports_usage
    weight: 1.0
    required: true
    config:
      pattern: 'report_usage|usage_reporter|input_tokens|output_tokens'
      file_key: content
  - type: pattern_required
    field: tracks_token_count
    weight: 1.0
    required: true
    config:
      pattern: 'usage\.input_tokens|usage\.output_tokens'
      file_key: content
scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
