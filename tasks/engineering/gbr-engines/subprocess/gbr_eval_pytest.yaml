task_id: eng.subprocess.gbr-eval.pytest
category: code_quality
component: gbr-eval
layer: engineering
tier: gate
description: "All pytest tests must pass for gbr-eval itself (self-eval)"
eval_owner: diogo.dantas
eval_cadence: per-pr

input:
  payload:
    repo: "."

expected: {}

graders:
  - type: subprocess
    weight: 1.0
    required: true
    config:
      command: ["uv", "run", "pytest", "--tb=short", "-q"]
      timeout_seconds: 120
      pass_pattern: "\\d+ passed"
      fail_pattern: "ERRORS|ERROR collecting"

scoring_mode: binary
pass_threshold: 1.0
