task_id: eng.gbr_reporting.no_stack_leak
category: classification
component: gbr-reporting
layer: engineering
tier: gate
description: "Reporting não deve expor stack traces em respostas de erro"
input:
  payload:
    repo: services/reporting
    scan_target: "app/**/*.py"
expected:
  convention: no_stack_leak
graders:
  - type: pattern_forbidden
    field: no_traceback_format
    weight: 1.0
    required: false
    config:
      pattern: 'traceback\.format_exc|traceback\.print_exc'
      file_key: content
      severity: warning
  - type: pattern_forbidden
    field: no_detail_str_exc
    weight: 1.0
    required: false
    config:
      pattern: 'detail\s*=\s*str\(.*(?:exc|error|err|e)\)'
      file_key: content
      severity: warning
  - type: pattern_forbidden
    field: no_fstring_exc_in_detail
    weight: 1.0
    required: false
    config:
      pattern: 'detail\s*=\s*f["\x27][^"'']*\{(?:str\()?(?:exc|error|err|e)\)?[^"'']*["\x27]'
      file_key: content
      severity: warning
scoring_mode: weighted
pass_threshold: 0.90
eval_owner: diogo.dantas
eval_cadence: per-pr
