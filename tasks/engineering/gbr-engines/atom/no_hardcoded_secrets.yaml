task_id: eng.gbr_atom.no_hardcoded_secrets
category: classification
component: gbr-atom
layer: engineering
tier: gate
description: "Atom service não deve conter secrets hardcoded"
input:
  payload:
    repo: services/atom
    scan_target: "**/*.py"
expected:
  convention: no_hardcoded_secrets
graders:
  - type: pattern_forbidden
    field: no_api_keys
    weight: 1.0
    required: true
    config:
      pattern: '(?:api_key|apikey|secret_key|api_secret)\s*=\s*["\x27][A-Za-z0-9+/=_\-]{16,}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_aws_keys
    weight: 1.0
    required: true
    config:
      pattern: 'AKIA[0-9A-Z]{16}'
      file_key: content
      severity: critical
  - type: pattern_forbidden
    field: no_connection_strings
    weight: 1.0
    required: true
    config:
      pattern: 'postgresql://\w+:\w+@'
      file_key: content
      severity: critical
scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
