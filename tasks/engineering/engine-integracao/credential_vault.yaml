task_id: eng.integracao.credential_vault
category: classification
component: engine-integracao
layer: engineering
tier: gate
description: "Credentials must come from vault/env, never inline in config"
input:
  payload:
    repo: engine-integracao
    scan_target: "**/*.py"
expected:
  convention: credential_vault_required
graders:
  - type: pattern_forbidden
    field: no_inline_credentials
    weight: 1.0
    required: true
    config:
      pattern: "(api_key|password|secret|token)\\s*=\\s*[\"'][^\"']{8,}"
      file_key: content
scoring_mode: binary
pass_threshold: 1.0
eval_owner: diogo.dantas
eval_cadence: per-pr
