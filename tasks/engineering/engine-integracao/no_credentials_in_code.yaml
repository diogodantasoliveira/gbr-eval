task_id: eng.integracao.no_credentials_in_code
category: classification
component: engine-integracao
layer: engineering
tier: gate
description: "Credentials must never appear in source code"
input:
  payload:
    repo: engine-integracao
    scan_target: "**/*.py"
expected:
  convention: no_hardcoded_credentials
graders:
  - type: pattern_forbidden
    field: no_hardcoded_secrets
    weight: 1.0
    required: true
    config:
      pattern: '(password|secret|api_key|token)\s*=\s*["\x27][^"\x27]{8,}'
      file_key: content
scoring_mode: binary
pass_threshold: 1.0
eval_owner: diogo.dantas
eval_cadence: per-pr
