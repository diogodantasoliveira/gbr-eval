task_id: eng.gbr-eval.no_secrets
category: classification
component: gbr-eval
layer: engineering
tier: gate
description: "Verifica que não há secrets, API keys ou credenciais hardcoded no código"

input:
  payload:
    repo: gbr-eval
    scan_target: "src/gbr_eval/**/*.py"

expected:
  convention: no_hardcoded_secrets

graders:
  - type: pattern_forbidden
    field: no_api_key_literal
    weight: 1.0
    required: true
    config:
      pattern: 'sk-ant-[a-zA-Z0-9]|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}'
      file_key: content
      severity: critical

  - type: pattern_forbidden
    field: no_password_literal
    weight: 1.0
    required: true
    config:
      pattern: "(?:password|passwd|secret)\\s*=\\s*[\"'][^\"']{8,}"
      file_key: content
      severity: critical

  - type: pattern_forbidden
    field: no_env_default_key
    weight: 1.0
    required: true
    config:
      pattern: "os\\.environ\\.get\\([^,]+,\\s*[\"']sk-"
      file_key: content
      severity: critical

scoring_mode: binary
pass_threshold: 1.0
eval_owner: diogo.dantas
eval_cadence: per-pr
