task_id: extraction.matricula.cpf_proprietario
category: extraction
component: ai-engine
layer: L2
tier: gate
tenant_profile: global
description: "Verifica extração do CPF do proprietário em matrícula de imóvel"

input:
  endpoint: /api/v1/extract
  payload:
    document_type: matricula
    skill: matricula_v1

expected:
  proprietario_cpf: "PLACEHOLDER — substituir por golden set real"
  proprietario_nome: "PLACEHOLDER"
  numero_matricula: "PLACEHOLDER"

graders:
  - type: exact_match
    field: proprietario_cpf
    weight: 3
    required: true
  - type: field_not_empty
    field: citation.proprietario_cpf
    weight: 3
    required: true
  - type: exact_match
    field: numero_matricula
    weight: 3
    required: true

scoring_mode: weighted
pass_threshold: 0.95
