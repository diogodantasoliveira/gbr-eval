task_id: product.frontend.import_and_integration
category: classification
component: gbr-eval-frontend
layer: product
tier: gate
description: "Verifica que o frontend suporta importação de runs e integração com CI/CD via webhook"

input:
  payload:
    repo: gbr-eval-frontend
    scan_target: "src/app/api/**/route.ts"

expected:
  convention: import_integration_features

graders:
  - type: pattern_required
    field: has_webhook_endpoint
    weight: 1.0
    required: true
    config:
      pattern: 'webhook'
      file_key: content
      severity: high

  - type: engineering_judge
    field: integration_review
    weight: 1.0
    required: false
    config:
      rubric: |
        Review this API route for CI/CD integration quality in an eval framework.
        Evaluate:
        1. WEBHOOK SECURITY: Is the webhook endpoint authenticated (bearer token, HMAC signature, or similar)?
        2. PAYLOAD VALIDATION: Is the incoming run payload validated with a schema (Zod) before processing?
        3. DUPLICATE HANDLING: Does the import logic handle duplicate run_ids gracefully (409 Conflict)?
        4. ERROR RESPONSES: Are validation errors returned with useful details (400/422 with field-level errors)?
        5. TRANSACTION SAFETY: Is the run + task_results insertion wrapped in a database transaction?
        Score 5 if all integration patterns are robust.
      min_score: 3.0
      file_key: content
      language: typescript

evaluation_mode: holistic
scoring_mode: hybrid
pass_threshold: 0.7
eval_owner: diogo.dantas
eval_cadence: per-pr
