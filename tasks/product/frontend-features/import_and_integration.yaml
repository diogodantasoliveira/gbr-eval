task_id: product.frontend.import_and_integration
category: classification
component: gbr-eval-frontend
layer: product
tier: canary
description: "Verifica que o frontend suporta importação de runs e integração com CI/CD via webhook"

input:
  payload:
    repo: gbr-eval-frontend
    scan_target: "src/app/api/**/route.ts"

expected:
  convention: import_integration_features

graders:
  - type: engineering_judge
    field: integration_review
    weight: 1.0
    required: true
    config:
      rubric: |
        Review these API routes for CI/CD integration and run import quality in an eval framework.
        Evaluate:
        1. WEBHOOK ENDPOINT: Does a dedicated webhook route exist for CI/CD run ingestion?
        2. WEBHOOK SECURITY: Is the webhook endpoint authenticated (bearer token, HMAC signature, or similar)?
        3. PAYLOAD VALIDATION: Is the incoming run payload validated with a schema (Zod) before processing?
        4. DUPLICATE HANDLING: Does the import logic handle duplicate run_ids gracefully (409 Conflict)?
        5. ERROR RESPONSES: Are validation errors returned with useful details (400/422 with field-level errors)?
        6. TRANSACTION SAFETY: Is the run + task_results insertion wrapped in a database transaction?
        7. RUN IMPORT: Can users upload/import JSON eval runs via the UI (not just webhook)?
        Score 5 if all 7 patterns are robust, 3 if basic import + webhook exist but lack security/validation.
      min_score: 2.0
      file_key: content
      language: typescript

evaluation_mode: holistic
scoring_mode: hybrid
pass_threshold: 0.7
eval_owner: diogo.dantas
eval_cadence: per-pr
