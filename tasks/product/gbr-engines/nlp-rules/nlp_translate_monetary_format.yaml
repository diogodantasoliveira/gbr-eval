task_id: prod.gbr_nlp_rules.monetary_format
category: classification
component: nlp-rules.translator
layer: product
tier: gate
description: "Valores monetários devem ser numéricos (3000), não formatados (R$ 3.000,00)"

input:
  payload:
    texto: "Renda mensal mínima de 3000 reais"
    dominio: "credito"
    condition:
      ">=":
        - var: "renda_mensal"
        - 3000
    confianca: 0.90
    vars_referenciados: ["renda_mensal"]

expected:
  dominio: "credito"
  confianca: 0.90

graders:
  - type: exact_match
    field: dominio
    weight: 0.5
    required: false
  - type: numeric_range
    field: confianca
    weight: 0.5
    required: false
    config:
      min: 0.85
      max: 1.0

scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
