task_id: prod.gbr_nlp_rules.translate_simple
category: classification
component: nlp-rules.translator
layer: product
tier: gate
description: "Tradução NL→JSONLogic deve gerar condição válida com confiança >= 0.85"

input:
  payload:
    texto: "Idade deve ser maior ou igual a 18 anos"
    dominio: "credito"
    condition:
      ">=":
        - var: "idade"
        - 18
    confianca: 0.92
    vars_referenciados: ["idade"]

expected:
  confianca: 0.92
  vars_referenciados: ["idade"]

graders:
  - type: numeric_range
    field: confianca
    weight: 0.5
    required: false
    config:
      min: 0.85
      max: 1.0
  - type: exact_match
    field: vars_referenciados
    weight: 0.5
    required: false

scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
