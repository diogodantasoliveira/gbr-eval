task_id: prod.gbr_nlp_rules.translate_simple
category: classification
component: nlp-rules.translator
layer: product
tier: gate
description: "Tradução NL→JSONLogic deve gerar condição válida com confiança >= 0.85"

input:
  payload:
    texto: "Idade deve ser maior ou igual a 18 anos"
    dominio: "credito"
    condition:
      ">=":
        - var: "idade"
        - 18
    confianca: 0.92
    vars_referenciados: ["idade"]

expected:
  min_confianca: 0.85
  required_vars: ["idade"]

graders:
  - type: numeric_range
    field: confianca_threshold
    weight: 0.5
    required: false
    config:
      field_path: confianca
      min: 0.85
      max: 1.0
  - type: set_membership
    field: vars_include_idade
    weight: 0.5
    required: false
    config:
      expected_set: ["idade"]
      field_path: vars_referenciados

scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
