task_id: prod.gbr_data_format.cpf_cnpj_standard
category: extraction
component: ai-engine.extractor
layer: product
tier: gate
description: "CPF deve ser 11 dígitos sem pontuação, CNPJ 14 dígitos sem pontuação"

input:
  payload:
    campos:
      cpf: "12345678900"
      cnpj: "12345678000199"

expected:
  campos:
    cpf: "12345678900"
    cnpj: "12345678000199"

graders:
  - type: regex_match
    field: campos.cpf
    weight: 0.5
    required: false
    config:
      pattern: '^\d{11}$'
  - type: regex_match
    field: campos.cnpj
    weight: 0.5
    required: false
    config:
      pattern: '^\d{14}$'

scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
