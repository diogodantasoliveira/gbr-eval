task_id: prod.gbr_parecer.required_sections
category: decision
component: parecer.generator
layer: product
tier: gate
description: "Parecer deve conter as 6 seções obrigatórias"

input:
  payload:
    secoes:
      - titulo: "Resumo"
        conteudo: "Auditoria do imóvel..."
      - titulo: "Análise Documental"
        conteudo: "Documentos apresentados..."
      - titulo: "Conformidade"
        conteudo: "Requisitos atendidos..."
      - titulo: "Achados"
        conteudo: "Foram identificados..."
      - titulo: "Recomendação"
        conteudo: "Recomenda-se..."
      - titulo: "Conclusão"
        conteudo: "Com base na análise..."
    resultado: "CONFORME"
    grau_risco: "BAIXO"

expected:
  resultado: "CONFORME"
  grau_risco: "BAIXO"

graders:
  - type: exact_match
    field: resultado
    weight: 0.3
    required: false
  - type: set_membership
    field: grau_risco
    weight: 0.2
    required: false
    config:
      valid_values: ["BAIXO", "MEDIO", "ALTO", "CRITICO"]
  - type: field_not_empty
    field: secoes
    weight: 0.5
    required: false

scoring_mode: weighted
pass_threshold: 0.90
eval_owner: diogo.dantas
eval_cadence: per-pr
