task_id: prod.gbr_extraction.no_hallucination
category: extraction
component: ai-engine.extractor
layer: product
tier: gate
description: "Campos ausentes devem ser null, nunca inventados"

input:
  payload:
    tipo_documento: identidade_rg
    campos:
      nome: "MARIA SILVA"
      cpf: "12345678900"
      cnh_numero: null
      passaporte: null

expected:
  campos:
    cnh_numero: null
    passaporte: null

graders:
  - type: exact_match
    field: campos.cnh_numero
    weight: 0.5
    required: false
  - type: exact_match
    field: campos.passaporte
    weight: 0.5
    required: false

scoring_mode: weighted
pass_threshold: 1.00
eval_owner: diogo.dantas
eval_cadence: per-pr
