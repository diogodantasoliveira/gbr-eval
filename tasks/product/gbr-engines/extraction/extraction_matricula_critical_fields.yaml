task_id: prod.gbr_extraction.matricula_critical_fields
category: extraction
component: ai-engine.extractor
layer: product
tier: gate
description: "Extração de matrícula deve incluir campos patrimoniais críticos"

input:
  payload:
    tipo_documento: patrimonial_matricula
    campos:
      numero_matricula: "123456"
      cartorio: "1o Oficio de Registro de Imoveis"
      area_total: "250.00"
      proprietarios: [{"nome": "JOAO SILVA", "cpf": "98765432100"}]
      tem_onus: true

expected:
  campos:
    numero_matricula: "123456"
    tem_onus: true
    area_total: "250.00"

graders:
  - type: exact_match
    field: campos.numero_matricula
    weight: 0.4
    required: false
  - type: exact_match
    field: campos.tem_onus
    weight: 0.3
    required: false
  - type: numeric_range
    field: campos.area_total
    weight: 0.3
    required: false
    config:
      min: 0.01
      max: 999999999

scoring_mode: weighted
pass_threshold: 0.90
eval_owner: diogo.dantas
eval_cadence: per-pr
