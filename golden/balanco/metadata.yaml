skill: balanco_v1
document_type: balanco
minimum_cases: 20
current_cases: 0
annotator: null
status: blocked_no_documents

critical_fields:
  - ativo_total
  - passivo_total
  - patrimonio_liquido
  - divida_liquida       # DERIVADO: empréstimos_total - caixa_equivalentes
  - liquidez_corrente    # DERIVADO: ativo_circulante / passivo_circulante

important_fields:
  - receita_liquida      # OPCIONAL — só quando DRE acompanha BP. null aceito.
  - resultado_exercicio

informative_fields:
  - data_referencia

field_weights:
  ativo_total: 3           # CRITICAL — float (R$)
  passivo_total: 3         # CRITICAL — float (R$)
  patrimonio_liquido: 3    # CRITICAL — float (R$)
  divida_liquida: 3        # CRITICAL — float (R$), derivado
  liquidez_corrente: 3     # CRITICAL — float (ratio AC/PC, 2 casas decimais)
  receita_liquida: 2       # IMPORTANT — float (R$) | null se sem DRE
  resultado_exercicio: 2   # IMPORTANT — float (R$)
  data_referencia: 1       # INFORMATIVE — string "dd/mm/aaaa"

# Notas de anotação:
# - divida_liquida = (empréstimos CP + empréstimos LP) - (caixa + equivalentes de caixa)
# - liquidez_corrente = ativo_circulante / passivo_circulante (arredondar 2 casas)
# - Se BP não tem DRE: receita_liquida = null, adicionar tag "sem_dre" no case
# - Verificar: ativo_total == passivo_total + patrimonio_liquido (tolerância 0.01)
